<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu du Songo</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Jeu du Songo</h1>

    <div id="infos">

    <div class="score">
        <h3>Joueur 1</h3>
        <span id="score1">0</span>
    </div>

    <div class="score">
        <h3>Joueur 2</h3>
        <span id="score2">0</span>
    </div>

</div>

<div id="controle">
    <button type="button" id="resetBtn">
        Nouvelle Partie
    </button>

    <div id="tour">
        Tour du Joueur 1
    </div>
</div>

    <div id="plateau">

        <!-- Ligne du haut -->
        <div class="case" data-index="13"></div>
        <div class="case" data-index="12"></div>
        <div class="case" data-index="11"></div>
        <div class="case" data-index="10"></div>
        <div class="case" data-index="9"></div>
        <div class="case" data-index="8"></div>
        <div class="case" data-index="7"></div>

        <!-- Ligne du bas -->
        <div class="case" data-index="0"></div>
        <div class="case" data-index="1"></div>
        <div class="case" data-index="2"></div>
        <div class="case" data-index="3"></div>
        <div class="case" data-index="4"></div>
        <div class="case" data-index="5"></div>
        <div class="case" data-index="6"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
